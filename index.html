<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>THE UNREMEMBERED · 未被记得者 — 十章怪谈</title>
<meta name="description" content="一部关于被遗忘、被看见与刻意去感受的怪奇互动叙事。灰谷镇的人不会失踪——他们只是不再被记得。">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230a0812'/%3E%3Ccircle cx='32' cy='26' r='10' fill='none' stroke='%23e8a33d' stroke-width='2.5'/%3E%3Cpath d='M32 36 L32 54 M22 46 L42 46' stroke='%235dcaa5' stroke-width='2.5'/%3E%3Ccircle cx='32' cy='14' r='2.5' fill='%23e24b4a'%3E%3C/circle%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+SC:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   THE UNREMEMBERED — 视觉系统
   语言：analog dusk（钠灯琥珀 × 磁带青 × CRT 辉光）
   对位：薄暮世界 soft-wrong（紫晕 · 呼吸的边缘 · 大一号的房间）
   ============================================================ */
:root{
  --ink:#0a0812;          /* 近黑的紫 */
  --ink2:#120e1c;
  --paper:#efe7d8;        /* 暖纸白 */
  --paper-dim:#b9aec9;
  --faint:#7d7194;
  --amber:#e8a33d;        /* 钠灯 */
  --amber-hi:#ffc46b;
  --sodium:#ff9b2f;
  --teal:#5dcaa5;         /* 帕里斯 / 结构 */
  --teal-deep:#1d9e75;
  --rose:#f0a58f;         /* 莫依 / 歌 */
  --violet:#9d8cff;       /* 薄暮 */
  --violet-deep:#6f5fd0;
  --red:#e24b4a;          /* 塔灯 / 危急 */
  --quiet:#c9c4d4;        /* 「寂」 */
  --line:#2c2438;
  --line-hi:#463a5e;
  --panel:#161021;
  --panel2:#1c1626;
  --serif:"EB Garamond","Cormorant Garamond",Georgia,"Noto Serif SC","Songti SC","STSong",serif;
  --sans:"Avenir Next","PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif;
  --mono:"JetBrains Mono","SF Mono",ui-monospace,Menlo,Consolas,"Courier New",monospace;
  --tspeed:1;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%}
html.hushed{transition:filter 2.2s ease}
body{
  height:100%;background:var(--ink);color:var(--paper);
  font-family:var(--serif);font-size:17px;line-height:1.85;
  overflow:hidden;cursor:default;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
}
::selection{background:rgba(232,163,61,.25);color:var(--paper)}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
canvas#atmos{position:fixed;inset:0;width:100%;height:100%;z-index:0;transition:filter 2.5s ease, opacity 2s ease}
canvas#grain{position:fixed;inset:0;width:100%;height:100%;z-index:60;pointer-events:none;opacity:.05;mix-blend-mode:overlay}
#app{position:fixed;inset:0;z-index:10;transition:filter 2.5s ease}
/* —— 世界状态滤镜：薄暮 / 深暮 —— */
body.veil #app, body.veil canvas#atmos{filter:hue-rotate(10deg) saturate(1.08) contrast(1.02)}
body.deep #app, body.deep canvas#atmos{filter:hue-rotate(26deg) saturate(.82) contrast(1.06) brightness(.92)}
body.veil .breath{animation:breathe 9s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.006)}}

/* —— CRT 层 —— */
#crt{position:fixed;inset:0;z-index:55;pointer-events:none;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0 1px, transparent 1px 3px);
  mix-blend-mode:multiply;opacity:.55}
#crt::after{content:"";position:absolute;inset:0;
  background:repeating-linear-gradient(90deg, rgba(255,60,80,.022) 0 1px, rgba(60,255,200,.02) 1px 2px, rgba(90,90,255,.022) 2px 3px)}
#vig{position:fixed;inset:0;z-index:56;pointer-events:none;
  background:radial-gradient(ellipse at 50% 46%, transparent 52%, rgba(4,2,10,.5) 88%, rgba(2,1,6,.82) 100%)}
#scanline{position:fixed;left:0;right:0;height:18vh;z-index:57;pointer-events:none;opacity:.05;
  background:linear-gradient(180deg, transparent, rgba(220,200,255,.5), transparent);
  animation:scandrift 11s linear infinite}
@keyframes scandrift{0%{top:-20%}100%{top:110%}}
#flashfx{position:fixed;inset:0;z-index:58;pointer-events:none;background:#fff;opacity:0;transition:opacity .12s}
body.flicker #app{animation:crtflick 7s steps(1) infinite}
@keyframes crtflick{0%,93%,100%{opacity:1}93.5%{opacity:.965}94%{opacity:1}96.2%{opacity:.978}96.4%{opacity:1}}
body.calm #crt, body.calm #scanline, body.calm canvas#grain{display:none}
body.calm #app{animation:none !important}
body.calm .glitch, body.calm .glitching{animation:none !important}

/* —— 通用屏幕 —— */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden auto;scrollbar-width:thin;scrollbar-color:var(--line-hi) transparent}
.screen::-webkit-scrollbar{width:5px}
.screen::-webkit-scrollbar-thumb{background:var(--line-hi);border-radius:3px}
.screen.center{align-items:center;justify-content:center}
.fadein{animation:fadein 1.1s ease both}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.fadeup{animation:fadeup .9s cubic-bezier(.2,.7,.3,1) both}
@keyframes fadeup{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* —— 文本风格 —— */
.mono{font-family:var(--mono)}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--faint)}
.amberglow{color:var(--amber-hi);text-shadow:0 0 18px rgba(232,163,61,.35), 0 0 46px rgba(232,163,61,.14)}
.tealglow{color:var(--teal);text-shadow:0 0 18px rgba(93,202,165,.3)}
.violetglow{color:var(--violet);text-shadow:0 0 20px rgba(157,140,255,.32)}
.chroma{text-shadow:-1px 0 rgba(255,40,90,.14), 1px 0 rgba(40,255,220,.12), 0 0 22px rgba(232,163,61,.18)}
hr.sep{border:none;height:1px;background:linear-gradient(90deg, transparent, var(--line-hi), transparent);margin:18px auto;width:72%}

/* —— 按钮 —— */
.btn{font-family:var(--serif);font-size:15.5px;letter-spacing:.14em;color:var(--paper-dim);
  padding:13px 26px;border:1px solid var(--line);border-radius:3px;background:rgba(22,16,33,.55);
  backdrop-filter:blur(3px);transition:all .28s ease;position:relative;overflow:hidden}
.btn:hover{color:var(--paper);border-color:var(--amber);box-shadow:0 0 22px rgba(232,163,61,.13), inset 0 0 22px rgba(232,163,61,.05);text-shadow:0 0 12px rgba(255,196,107,.4)}
.btn:active{transform:translateY(1px)}
.btn.teal:hover{border-color:var(--teal);box-shadow:0 0 22px rgba(93,202,165,.14), inset 0 0 22px rgba(93,202,165,.05)}
.btn.violet:hover{border-color:var(--violet);box-shadow:0 0 22px rgba(157,140,255,.15)}
.btn.small{padding:8px 16px;font-size:13px}
.btn:disabled{opacity:.35;pointer-events:none}
.btn.picked{border-color:var(--amber);color:var(--amber-hi);pointer-events:none}
.btn-hush{font-family:var(--serif);font-size:15px;letter-spacing:.3em;color:#dcd8e6;
  padding:13px 26px;border:1px solid rgba(220,216,230,.35);border-radius:3px;
  background:linear-gradient(180deg, rgba(210,205,225,.07), rgba(210,205,225,.02));
  transition:all .5s ease}
.btn-hush:hover{color:#fff;border-color:#fff;box-shadow:0 0 34px rgba(230,228,240,.18);letter-spacing:.38em}
.btn-hush::after{content:"……一切都会停下来。";display:block;font-size:10.5px;letter-spacing:.18em;color:rgba(220,216,230,.4);margin-top:3px}

/* ============ 启动 BOOT ============ */
.boot{font-family:var(--mono);color:#9b8fb5;font-size:13px;line-height:2.2;padding:7vh 8vw;letter-spacing:.06em}
.boot .ok{color:var(--teal)}
.boot .warn{color:var(--amber)}
.boot .err{color:var(--red)}
.boot-cta{margin-top:5vh;display:flex;flex-direction:column;align-items:center;gap:18px}
.dial-knob{width:118px;height:118px;border-radius:50%;border:1px solid var(--line-hi);position:relative;cursor:pointer;
  background:radial-gradient(circle at 38% 32%, #241a33, #120d1d 70%);
  box-shadow:0 0 0 8px rgba(22,16,33,.6), 0 0 44px rgba(232,163,61,.07), inset 0 2px 14px rgba(0,0,0,.7);
  transition:transform 1.2s cubic-bezier(.3,.9,.3,1), box-shadow .8s}
.dial-knob::before{content:"";position:absolute;top:8px;left:50%;width:2px;height:26px;background:var(--amber);transform:translateX(-50%);box-shadow:0 0 10px var(--amber)}
.dial-knob:hover{box-shadow:0 0 0 8px rgba(22,16,33,.6), 0 0 60px rgba(232,163,61,.18), inset 0 2px 14px rgba(0,0,0,.7)}
.dial-knob.turned{transform:rotate(123deg)}
.boot-freq{font-family:var(--mono);font-size:12px;letter-spacing:.4em;color:var(--faint)}

/* ============ 标题 TITLE ============ */
.title-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:6vh 22px;text-align:center;position:relative;z-index:2}
.t-eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.52em;color:var(--faint);text-transform:uppercase;margin-bottom:3.2vh;animation:fadein 2.4s both .4s}
.t-main{font-family:var(--serif);font-weight:500;font-size:clamp(34px,7.2vw,84px);letter-spacing:.16em;line-height:1.12;color:var(--paper);margin-bottom:1.4vh;text-transform:uppercase}
.t-main .t-l{display:inline-block;transition:opacity 2.6s ease, filter 2.6s ease, transform 2.6s ease;
  text-shadow:0 0 26px rgba(232,163,61,.22), 0 0 70px rgba(232,163,61,.08), -1px 0 rgba(255,40,90,.1), 1px 0 rgba(40,255,220,.1)}
.t-main .t-l.unrem{opacity:.13;filter:blur(2.5px);transform:translateY(-3px)}
.t-zh{font-size:clamp(17px,2.5vw,25px);letter-spacing:1.1em;text-indent:1.1em;color:var(--amber-hi);opacity:.92;margin-bottom:1vh;text-shadow:0 0 24px rgba(232,163,61,.3)}
.t-sub{font-family:var(--mono);font-size:11.5px;letter-spacing:.3em;color:var(--faint);margin-bottom:5.2vh}
.t-menu{display:flex;flex-direction:column;gap:13px;width:min(330px,82vw)}
.t-menu .btn{width:100%}
.t-foot{margin-top:5vh;font-family:var(--mono);font-size:10px;letter-spacing:.24em;color:#564b6e;line-height:2.1}
.t-foot b{color:#6f6388;font-weight:400}

/* ============ 章节频率表 DIAL ============ */
.dialhead{padding:5.5vh 22px 2vh;text-align:center}
.dial-band{position:relative;height:54px;margin:0 auto 26px;max-width:680px;border-bottom:1px solid var(--line-hi);
  background:repeating-linear-gradient(90deg, var(--line) 0 1px, transparent 1px 9%);opacity:.8}
.dial-needle{position:absolute;top:0;bottom:-6px;width:2px;background:var(--red);box-shadow:0 0 12px var(--red);transition:left 1.1s cubic-bezier(.3,.8,.3,1)}
.freq-list{display:flex;flex-direction:column;gap:9px;max-width:680px;margin:0 auto;padding:0 22px 9vh;width:100%}
.freq{display:flex;align-items:baseline;gap:16px;padding:15px 20px;border:1px solid var(--line);border-radius:3px;
  background:rgba(22,16,33,.5);text-align:left;transition:all .3s;font-family:var(--serif)}
.freq:hover:not(.locked){border-color:var(--amber);background:rgba(36,26,51,.6);box-shadow:0 0 24px rgba(232,163,61,.08)}
.freq .fq{font-family:var(--mono);font-size:12px;color:var(--amber);letter-spacing:.1em;min-width:72px}
.freq .ft{flex:1;font-size:16.5px;letter-spacing:.06em;color:var(--paper)}
.freq .ft em{display:block;font-style:normal;font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;color:var(--faint);margin-top:2px}
.freq .fs{font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;color:var(--teal)}
.freq.locked{opacity:.42;cursor:default}
.freq.locked .ft{color:var(--faint);filter:blur(3.5px)}
.freq.locked .fs{color:#564b6e}
.freq.done .fs{color:var(--faint)}
.freq.lying .ft{color:var(--violet)}
.side-label{font-family:var(--mono);font-size:10px;letter-spacing:.4em;color:#564b6e;margin:14px 0 4px;text-align:center}

/* ============ 叙事舞台 STAGE ============ */
.stage{position:absolute;inset:0;display:flex;flex-direction:column;z-index:2}
.hudmini{display:flex;align-items:center;gap:14px;padding:12px 18px;font-family:var(--mono);font-size:10.5px;
  letter-spacing:.18em;color:var(--faint);border-bottom:1px solid rgba(44,36,56,.6);background:rgba(10,8,18,.55);backdrop-filter:blur(6px);z-index:5}
.hudmini .hm-ch{color:var(--amber);white-space:nowrap}
.hudmini .hm-meters{display:flex;gap:14px;margin-left:auto;align-items:center}
.hm-meter{display:flex;align-items:center;gap:7px;transition:opacity 1.2s, transform 1.2s}
.hm-meter.gone{opacity:0;transform:translateY(-12px);pointer-events:none}
.hm-meter b{font-weight:400;font-size:10px;color:var(--paper-dim)}
.hm-track{width:64px;height:4px;background:#221b2f;border-radius:2px;overflow:hidden}
.hm-fill{height:100%;border-radius:2px;transition:width .9s ease, background .9s}
.hm-pause{border:1px solid var(--line);border-radius:3px;padding:4px 11px;color:var(--faint);font-family:var(--mono);font-size:10px;letter-spacing:.2em;transition:all .25s}
.hm-pause:hover{color:var(--paper);border-color:var(--line-hi)}
.beatscroll{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:var(--line-hi) transparent;scroll-behavior:smooth}
.beatscroll::-webkit-scrollbar{width:4px}
.beatscroll::-webkit-scrollbar-thumb{background:var(--line)}
.beats{max-width:660px;margin:0 auto;padding:7vh 26px 30vh;display:flex;flex-direction:column;gap:26px}
.nar{font-size:17.5px;line-height:2.05;color:var(--paper);letter-spacing:.02em;text-shadow:0 0 30px rgba(239,231,216,.06)}
.nar.dim{color:var(--paper-dim);font-size:16px}
.nar.lit{color:var(--amber-hi);text-shadow:0 0 22px rgba(232,163,61,.25)}
.nar.veil{color:#cfc4f4;text-shadow:0 0 22px rgba(157,140,255,.25)}
.nar.center{text-align:center}
.sysmsg{font-family:var(--mono);font-size:12px;letter-spacing:.14em;line-height:2;color:var(--teal);
  border-left:2px solid var(--teal-deep);padding:10px 16px;background:rgba(29,158,117,.05)}
.sysmsg.bad{color:#e89b9b;border-color:var(--red);background:rgba(226,75,74,.05)}
.sysmsg.ghost{color:#b9b2d4;border-color:var(--violet-deep);background:rgba(157,140,255,.05)}
.say{display:flex;gap:14px;align-items:flex-start}
.say-chip{flex-shrink:0;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-size:17px;border:1px solid;position:relative;margin-top:3px}
.say-body{flex:1}
.say-name{font-family:var(--mono);font-size:10.5px;letter-spacing:.3em;margin-bottom:5px;min-height:14px}
.say-text{font-size:17px;line-height:1.95;color:var(--paper)}
.who-moyi .say-chip{background:#2e1c22;color:var(--rose);border-color:#7a4538;box-shadow:0 0 16px rgba(240,165,143,.12)}
.who-moyi .say-name{color:var(--rose)}
.who-paris .say-chip{background:#10261f;color:var(--teal);border-color:#1d6b52;box-shadow:0 0 16px rgba(93,202,165,.12)}
.who-paris .say-name{color:var(--teal)}
.who-senna .say-chip{background:#1f1c33;color:#b4a7ee;border-color:#544a8a;box-shadow:0 0 16px rgba(157,140,255,.14)}
.who-senna .say-name{color:#b4a7ee}
.who-quiet .say-chip{background:#1a1a1e;color:var(--quiet);border-color:#4e4c58;box-shadow:0 0 22px rgba(201,196,212,.1)}
.who-quiet .say-name{color:var(--quiet);letter-spacing:.5em}
.who-quiet .say-text{color:#d6d2e0;letter-spacing:.06em}
.who-other .say-chip{background:#241d31;color:var(--paper-dim);border-color:var(--line-hi)}
.who-other .say-name{color:var(--paper-dim)}
.who-asha .say-chip{background:#2c2310;color:#e7c46a;border-color:#8a6b2a;box-shadow:0 0 16px rgba(231,196,106,.12)}
.who-asha .say-name{color:#e7c46a}
.blurface{filter:blur(5px) !important;color:transparent !important;text-shadow:0 0 9px rgba(180,167,238,.9)}
.say-chip.blurface::after{content:"";position:absolute;inset:-1px;border-radius:50%;background:rgba(31,28,51,.55);backdrop-filter:blur(2px)}
.advancer{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:10px;
  letter-spacing:.4em;color:#564b6e;animation:advpulse 2.6s ease-in-out infinite;pointer-events:none;z-index:6}
@keyframes advpulse{0%,100%{opacity:.25}50%{opacity:.8}}

/* —— 章节卡 —— */
.tcard{position:fixed;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 60%, rgba(18,13,29,.94), rgba(6,4,12,.99));text-align:center;padding:24px}
.tcard-no{font-family:var(--mono);font-size:11px;letter-spacing:.62em;color:var(--amber);margin-bottom:3vh;text-transform:uppercase}
.tcard-en{font-family:var(--serif);font-size:clamp(24px,4.6vw,46px);letter-spacing:.18em;color:var(--paper);text-transform:uppercase;margin-bottom:1.6vh;line-height:1.3}
.tcard-zh{font-size:clamp(15px,2.2vw,21px);letter-spacing:.5em;text-indent:.5em;color:var(--paper-dim)}
.tcard-rule{width:1px;height:7vh;background:linear-gradient(180deg,transparent,var(--amber),transparent);margin:3.4vh 0}
.tcard-tag{font-family:var(--mono);font-size:10.5px;letter-spacing:.3em;color:var(--faint);max-width:520px;line-height:2.2}

/* —— 选择 —— */
.choices{display:flex;flex-direction:column;gap:11px;padding:6px 0 2px}
.choice{text-align:left;font-family:var(--serif);font-size:16px;line-height:1.7;letter-spacing:.04em;color:var(--paper-dim);
  padding:14px 20px 14px 46px;border:1px solid var(--line);border-radius:3px;background:rgba(22,16,33,.5);position:relative;transition:all .3s}
.choice::before{content:"◇";position:absolute;left:18px;top:14px;color:var(--faint);font-size:13px;transition:all .3s}
.choice:hover{color:var(--paper);border-color:var(--amber);background:rgba(36,26,51,.55)}
.choice:hover::before{color:var(--amber);content:"◆"}
.choice.picked{border-color:var(--amber);color:var(--amber-hi);background:rgba(232,163,61,.06)}
.choice.picked::before{content:"◆";color:var(--amber)}
.choice.unpicked{opacity:.3;pointer-events:none}
.choice.hushy{border-color:rgba(220,216,230,.3);color:#d6d2e0;letter-spacing:.18em}
.choice.hushy::before{content:"○";color:#d6d2e0}
.choice.hushy:hover{border-color:#fff;background:rgba(220,216,230,.06);box-shadow:0 0 26px rgba(230,228,240,.1)}
.choice.gone-mem{opacity:.4;pointer-events:none;border-style:dashed}
.choice small{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--faint);margin-top:4px}

/* —— 长按交互 —— */
.holdwrap{display:flex;flex-direction:column;align-items:center;gap:18px;padding:22px 0 8px}
.holdbtn{width:148px;height:148px;border-radius:50%;position:relative;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  border:1px solid var(--line-hi);background:radial-gradient(circle at 42% 36%, rgba(40,30,58,.9), rgba(14,10,24,.95) 70%);
  box-shadow:0 0 0 10px rgba(22,16,33,.45), 0 0 50px rgba(232,163,61,.08);transition:box-shadow .5s}
.holdbtn:hover{box-shadow:0 0 0 10px rgba(22,16,33,.45), 0 0 70px rgba(232,163,61,.16)}
.holdbtn .hb-ring{position:absolute;inset:-1px;border-radius:50%;
  background:conic-gradient(var(--amber) calc(var(--p,0)*1%), rgba(70,58,94,.35) 0);
  -webkit-mask:radial-gradient(circle, transparent 66%, #000 67.5%);mask:radial-gradient(circle, transparent 66%, #000 67.5%)}
.holdbtn .hb-ico{font-size:26px;line-height:1}
.holdbtn .hb-tx{font-family:var(--mono);font-size:10px;letter-spacing:.34em;color:var(--paper-dim);text-align:center}
.holdbtn.singing{box-shadow:0 0 0 10px rgba(22,16,33,.45), 0 0 90px rgba(232,163,61,.3)}
.holdbtn.feel{width:172px;height:172px}
.holdbtn.feel .hb-tx{font-size:12px;letter-spacing:.42em;color:var(--paper)}
.hold-cap{font-family:var(--mono);font-size:11px;letter-spacing:.26em;color:var(--faint);text-align:center;min-height:18px;transition:color .6s}
.hold-cap.hard{color:#e89b9b}

/* —— 通用面板 / 卡片 —— */
.panel{border:1px solid var(--line);border-radius:4px;background:rgba(22,16,33,.62);backdrop-filter:blur(4px);padding:18px 20px}
.cardrow{display:flex;flex-wrap:wrap;gap:12px}
.pcard{flex:1 1 180px;border:1px solid var(--line);border-radius:4px;background:rgba(22,16,33,.6);padding:16px 16px;text-align:left;transition:all .3s;position:relative}
.pcard:hover{border-color:var(--line-hi)}
.pcard h4{font-size:15.5px;font-weight:500;letter-spacing:.08em;color:var(--paper);margin-bottom:6px}
.pcard p{font-size:12.5px;line-height:1.9;color:var(--faint)}
.pcard .tag{position:absolute;top:12px;right:12px;font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--faint)}
.pcard.sel{border-color:var(--amber);box-shadow:0 0 22px rgba(232,163,61,.1)}
.pcard.spent{opacity:.32;pointer-events:none;border-style:dashed}
.pcard.woke{border-color:var(--teal);box-shadow:0 0 22px rgba(93,202,165,.12)}

/* —— 第一章 · 界面消失 —— */
.fakehud{position:fixed;inset:0;pointer-events:none;z-index:30;font-family:var(--mono)}
.fh{position:absolute;transition:opacity 1.4s ease, filter 1.4s ease, transform 1.4s}
.fh.erased{opacity:0;filter:blur(8px);transform:scale(.96)}
.fh-hp{top:18px;left:18px;display:flex;align-items:center;gap:9px;font-size:10px;letter-spacing:.22em;color:var(--paper-dim)}
.fh-hp .bar{width:130px;height:7px;border:1px solid var(--line-hi);border-radius:3px;overflow:hidden}
.fh-hp .bar i{display:block;height:100%;width:88%;background:linear-gradient(90deg,#c8474b,#e8766a)}
.fh-map{top:18px;right:18px;width:120px;height:88px;border:1px solid var(--line-hi);border-radius:4px;background:rgba(15,12,21,.85);overflow:hidden}
.fh-map .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(70,58,94,.4) 1px,transparent 1px),linear-gradient(90deg,rgba(70,58,94,.4) 1px,transparent 1px);background-size:14px 14px}
.fh-map .you{position:absolute;top:48%;left:46%;width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 9px var(--teal)}
.fh-map .cap{position:absolute;bottom:4px;left:7px;font-size:8.5px;letter-spacing:.18em;color:var(--faint)}
.fh-quest{bottom:74px;left:18px;font-size:10.5px;letter-spacing:.24em;color:var(--amber);border-left:2px solid var(--amber);padding:5px 12px;background:rgba(232,163,61,.05)}
.fh-pause{bottom:18px;left:18px;font-size:10px;letter-spacing:.3em;color:var(--faint);border:1px solid var(--line);border-radius:3px;padding:6px 13px}
.fh-name{bottom:18px;right:18px;font-size:10.5px;letter-spacing:.3em;color:#b4a7ee;border:1px solid #544a8a;border-radius:3px;padding:6px 14px;background:rgba(31,28,51,.6)}
.phone{max-width:330px;margin:8px auto;border:1px solid var(--line-hi);border-radius:14px;background:#0d0a16;padding:14px 14px 12px;box-shadow:0 14px 50px rgba(0,0,0,.5), 0 0 36px rgba(157,140,255,.06)}
.ph-top{font-family:var(--mono);font-size:9.5px;letter-spacing:.26em;color:var(--faint);text-align:center;padding-bottom:10px;border-bottom:1px solid var(--line)}
.ph-thread{padding:14px 4px;display:flex;flex-direction:column;gap:8px;min-height:90px}
.ph-bub{max-width:82%;font-family:var(--sans);font-size:13.5px;line-height:1.65;padding:9px 13px;border-radius:13px}
.ph-bub.them{align-self:flex-start;background:#221b32;color:var(--paper-dim);border-bottom-left-radius:4px}
.ph-bub.me{align-self:flex-end;background:#2c3f57;color:#dfe9f6;border-bottom-right-radius:4px;position:relative}
.ph-input{display:flex;gap:8px;align-items:center;border-top:1px solid var(--line);padding-top:10px}
.ph-field{flex:1;font-family:var(--sans);font-size:13px;color:var(--paper);background:#171221;border:1px solid var(--line);border-radius:9px;padding:9px 12px;min-height:38px;line-height:1.5}
.ph-field .caret{display:inline-block;width:1px;height:14px;background:var(--paper);vertical-align:-2px;animation:caretblink 1s steps(1) infinite;margin-left:1px}
@keyframes caretblink{0%,49%{opacity:1}50%,100%{opacity:0}}
.ph-del{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:#e89b9b;border:1px solid #5e2c33;border-radius:8px;padding:9px 13px;background:rgba(226,75,74,.06);transition:all .3s}
.ph-del:hover{background:rgba(226,75,74,.14);color:#ffb3b3}
.ph-send{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--faint);border:1px solid var(--line);border-radius:8px;padding:9px 13px;opacity:.45;cursor:not-allowed}

/* —— 缘线步 Threadstep —— */
.tsfield{position:relative;height:300px;border:1px solid var(--line);border-radius:5px;overflow:hidden;
  background:radial-gradient(ellipse at 50% 110%, rgba(58,42,77,.4), rgba(10,8,18,.85))}
.tsnode{position:absolute;width:50px;height:50px;margin:-25px 0 0 -25px;border-radius:50%;cursor:pointer;border:none;background:transparent}
.tsnode i{position:absolute;inset:14px;border-radius:50%;background:var(--amber);opacity:.85;box-shadow:0 0 18px var(--amber), 0 0 50px rgba(232,163,61,.5);animation:nodepulse 2.4s ease-in-out infinite}
.tsnode.cold i{background:#39304e;box-shadow:none;animation:none;opacity:.5}
.tsnode.stepped i{background:var(--teal);box-shadow:0 0 18px var(--teal);animation:none}
.tsnode .nl{position:absolute;top:52px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:9px;letter-spacing:.18em;color:var(--faint);white-space:nowrap}
@keyframes nodepulse{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}
.tsmoyi{position:absolute;width:10px;height:10px;margin:-5px 0 0 -5px;border-radius:50%;background:var(--rose);box-shadow:0 0 14px var(--rose), 0 0 40px rgba(240,165,143,.5);transition:left 1s cubic-bezier(.4,0,.2,1), top 1s cubic-bezier(.4,0,.2,1);z-index:3}

/* —— 第二章 · 积压者排序 —— */
.bk-board{display:flex;flex-direction:column;gap:10px}
.bk-frag{text-align:left;border:1px solid var(--line);border-radius:4px;background:rgba(22,16,33,.65);padding:13px 16px;transition:all .3s;position:relative}
.bk-frag .bf-t{font-size:14.5px;line-height:1.8;color:var(--paper-dim)}
.bk-frag .bf-d{font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;color:#564b6e;margin-top:5px}
.bk-frag:hover{border-color:var(--violet);background:rgba(36,26,51,.6)}
.bk-frag.sent{opacity:.35;pointer-events:none;border-color:var(--teal-deep)}
.bk-frag.sent::after{content:"已送达";position:absolute;top:10px;right:12px;font-family:var(--mono);font-size:9px;letter-spacing:.3em;color:var(--teal)}
.bk-prog{font-family:var(--mono);font-size:10px;letter-spacing:.3em;color:var(--faint);text-align:center;padding:6px 0}

/* —— 第三章 · 直播间 —— */
.chatcol{height:240px;overflow:hidden;border:1px solid var(--line);border-radius:5px;background:rgba(13,10,22,.85);position:relative;padding:8px 0;mask-image:linear-gradient(180deg,transparent,#000 18%,#000 86%,transparent)}
.chatmsg{font-family:var(--sans);font-size:12.5px;line-height:1.5;padding:4px 14px;color:var(--paper-dim);animation:chatup .5s ease both}
.chatmsg b{font-weight:500;font-size:11.5px;margin-right:7px}
.chatmsg.adore b{color:#f0a58f}.chatmsg.demand b{color:#e7c46a}.chatmsg.cold b{color:#8d80a8}
.chatmsg.heart{color:#f3d9e8;text-align:center;letter-spacing:.3em}
@keyframes chatup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.moodrow{display:flex;gap:10px;justify-content:center;padding:12px 0 4px}
.mood{font-family:var(--mono);font-size:11px;letter-spacing:.26em;padding:10px 22px;border:1px solid var(--line);border-radius:3px;color:var(--paper-dim);transition:all .3s}
.mood.adore:hover,.mood.adore.on{border-color:var(--rose);color:var(--rose);box-shadow:0 0 22px rgba(240,165,143,.12)}
.mood.demand:hover,.mood.demand.on{border-color:#e7c46a;color:#e7c46a;box-shadow:0 0 22px rgba(231,196,106,.12)}

/* —— 第四章 · 读裂 —— */
.house-tabs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding-bottom:12px}
.htab{font-family:var(--mono);font-size:10px;letter-spacing:.16em;padding:8px 13px;border:1px solid var(--line);border-radius:3px;color:var(--faint);transition:all .25s}
.htab.on{border-color:var(--teal);color:var(--teal)}
.htab.done{border-color:var(--teal-deep);color:var(--faint);text-decoration:line-through}
.houseview{position:relative;border:1px solid var(--line);border-radius:5px;min-height:240px;background:rgba(13,10,22,.8);padding:26px 26px;font-size:15px;line-height:2.1;color:var(--paper-dim)}
.crackword{cursor:pointer;position:relative;color:var(--paper-dim);transition:color .3s;border-bottom:1px dashed transparent}
.crackword:hover{color:var(--teal)}
.crackword.lie{animation:crackshimmer 3.2s ease-in-out infinite}
@keyframes crackshimmer{0%,100%{text-shadow:none}50%{text-shadow:0 0 14px rgba(93,202,165,.55)}}
.crackword.found{color:var(--teal);border-bottom-color:var(--teal);text-shadow:0 0 14px rgba(93,202,165,.5)}

/* —— 第五章 · 燃忆 —— */
.memlist{display:flex;flex-direction:column;gap:9px}
.memitem{display:flex;align-items:baseline;gap:13px;text-align:left;border:1px solid var(--line);border-radius:4px;background:rgba(22,16,33,.6);padding:12px 16px;transition:all .3s}
.memitem:hover{border-color:var(--amber)}
.memitem .mi-n{font-size:15px;color:var(--paper);letter-spacing:.04em;flex:1}
.memitem .mi-c{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;color:#c98a8a;text-align:right;line-height:1.8}
.memitem.burned{opacity:.3;pointer-events:none;border-style:dashed}
.memitem.burned .mi-n{text-decoration:line-through;color:var(--faint)}

/* —— 第六章 · 评分 —— */
.gradebox{position:relative;border:1px solid var(--line);border-radius:5px;background:rgba(13,10,22,.8);padding:22px;text-align:center}
.gstamp{display:inline-block;font-family:var(--mono);font-size:30px;letter-spacing:.1em;color:var(--red);border:2px solid var(--red);border-radius:5px;padding:5px 17px;transform:rotate(-7deg);opacity:0;text-shadow:0 0 16px rgba(226,75,74,.4)}
.gstamp.ok{color:var(--teal);border-color:var(--teal);text-shadow:0 0 16px rgba(93,202,165,.4)}
.gstamp.stamped{animation:stampin .4s cubic-bezier(.2,2,.4,1) both}
@keyframes stampin{from{opacity:0;transform:rotate(-7deg) scale(2.2)}to{opacity:1;transform:rotate(-7deg) scale(1)}}
.beamfield{position:relative;height:210px;border:1px solid var(--line);border-radius:5px;overflow:hidden;background:rgba(13,10,22,.85)}
.rubeam{position:absolute;top:0;bottom:0;width:64px;background:linear-gradient(90deg,transparent,rgba(231,196,106,.16),transparent);border-left:1px solid rgba(231,196,106,.25);border-right:1px solid rgba(231,196,106,.25)}
.stillbtn{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);font-family:var(--mono);font-size:10px;letter-spacing:.3em;color:var(--paper-dim);border:1px solid var(--line-hi);border-radius:3px;padding:10px 22px;background:rgba(10,8,18,.8);user-select:none;-webkit-user-select:none;touch-action:none}
.stillbtn.holding{border-color:var(--teal);color:var(--teal)}
.moyidot{position:absolute;width:11px;height:11px;border-radius:50%;background:var(--rose);box-shadow:0 0 13px var(--rose);top:46%;left:12%;transition:left .8s ease}

/* —— 第八章 · 崩塌 —— */
.collapse-it{font-family:var(--mono);font-size:12.5px;letter-spacing:.16em;color:var(--paper-dim);padding:11px 16px;border-left:2px solid var(--line-hi);background:rgba(22,16,33,.5);transition:all .5s}
.collapse-it.falling{color:#e89b9b;border-color:var(--red);background:rgba(226,75,74,.06);text-decoration:line-through;transform:translateX(6px) skewX(-2deg);opacity:.55}

/* —— 第九章 · 三个莫依 / 谎言菜单 / 砖 —— */
.moyi3{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}
.m3card{text-align:left;border:1px solid #544a8a;border-radius:4px;background:rgba(31,28,51,.55);padding:16px;transition:all .3s;cursor:pointer}
.m3card:hover{border-color:var(--violet);box-shadow:0 0 26px rgba(157,140,255,.14)}
.m3card h5{font-family:var(--mono);font-size:10px;letter-spacing:.3em;color:var(--violet);margin-bottom:8px}
.m3card p{font-size:13.5px;line-height:1.95;color:var(--paper-dim)}
.m3card.wrong{opacity:.25;pointer-events:none;filter:blur(1px)}
.m3card.true{border-color:var(--rose);box-shadow:0 0 26px rgba(240,165,143,.2)}
.brickrow{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;padding:8px 0}
.brick{width:88px;height:52px;border:1px solid var(--line-hi);border-radius:3px;background:linear-gradient(180deg,#241c35,#171123);position:relative;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:none;transition:all .4s;display:flex;align-items:center;justify-content:center}
.brick .bp{position:absolute;inset:auto 0 0 0;height:3px;background:var(--teal);width:0%;transition:none}
.brick span{font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--faint)}
.brick.laid{border-color:var(--teal);background:linear-gradient(180deg,#15302a,#0d211c);box-shadow:0 0 18px rgba(93,202,165,.16)}
.brick.laid span{color:var(--teal)}
.brick.crumble{animation:crumble .5s ease both}
@keyframes crumble{30%{transform:translateY(2px) rotate(1.5deg)}100%{transform:translateY(8px);opacity:.25}}

/* —— 第十章 · 审计与舞台 —— */
.audit{display:flex;flex-direction:column;gap:10px}
.audit-row{display:flex;align-items:baseline;gap:14px;font-family:var(--mono);font-size:12px;letter-spacing:.16em;color:var(--paper-dim);border-bottom:1px dashed var(--line);padding:9px 4px}
.audit-row b{font-size:20px;color:var(--amber-hi);font-weight:400;min-width:44px;text-align:right;text-shadow:0 0 16px rgba(232,163,61,.3)}
.audit-row span{flex:1}
.audit-row em{font-style:normal;font-size:10px;color:var(--faint)}
.feelwrap{position:fixed;inset:0;z-index:45;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:7vh;pointer-events:none}
.feelwrap .holdbtn{pointer-events:auto}
.feelcap{position:fixed;left:0;right:0;top:30%;text-align:center;font-size:clamp(17px,2.6vw,24px);letter-spacing:.16em;color:var(--paper);padding:0 24px;text-shadow:0 0 30px rgba(239,231,216,.15);transition:opacity 1s;line-height:2}
.feelcap.hard{color:#eba7a7;text-shadow:0 0 30px rgba(226,75,74,.25)}
.credits{display:flex;flex-direction:column;align-items:center;gap:3.4vh;text-align:center;padding:16vh 24px}
.cr-k{font-family:var(--mono);font-size:10px;letter-spacing:.5em;color:var(--faint);text-transform:uppercase}
.cr-v{font-size:19px;letter-spacing:.22em;color:var(--paper)}
.lamp{width:3px;height:120px;background:linear-gradient(180deg,#3a3148,#241d31);margin:0 auto;position:relative}
.lamp::before{content:"";position:absolute;top:-7px;left:-7px;width:17px;height:11px;border-radius:45%;background:var(--sodium);box-shadow:0 0 30px var(--sodium),0 0 90px rgba(255,155,47,.5)}

/* ============ 二人组 DUET HUD ============ */
.u-shell{max-width:1060px;margin:0 auto;padding:4.5vh 18px 8vh;width:100%}
.u-frame{background:rgba(16,12,24,.88);border:1px solid var(--line);border-radius:8px;overflow:hidden;backdrop-filter:blur(8px);box-shadow:0 30px 90px rgba(0,0,0,.5), 0 0 70px rgba(157,140,255,.04)}
.u-top{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;background:rgba(28,22,38,.7);border-bottom:1px solid var(--line)}
.u-logo{display:flex;align-items:center;gap:11px}
.u-logo .dot{width:9px;height:9px;border-radius:50%;background:var(--red);box-shadow:0 0 0 3px rgba(226,75,74,.16),0 0 12px var(--red);animation:towerblink 3.2s ease-in-out infinite}
@keyframes towerblink{0%,100%{opacity:1}50%{opacity:.35}}
.u-logo b{font-family:var(--serif);font-size:13px;font-weight:500;letter-spacing:.22em;color:var(--paper);text-transform:uppercase;display:block}
.u-logo span{font-family:var(--mono);font-size:9.5px;color:var(--faint);letter-spacing:.18em}
.u-topright{display:flex;align-items:center;gap:18px;font-family:var(--mono);font-size:11px;color:var(--paper-dim)}
.u-res{display:flex;align-items:center;gap:7px}
.u-res i{font-style:normal;font-size:13px}
.u-body{display:grid;grid-template-columns:178px minmax(0,1fr) 196px}
.u-roster{background:rgba(20,15,30,.6);border-right:1px solid var(--line);padding:13px 11px}
.u-sec{font-family:var(--mono);font-size:9.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--faint);margin:0 0 10px 3px}
.u-char{display:flex;align-items:center;gap:10px;width:100%;padding:9px;border-radius:6px;border:1px solid transparent;margin-bottom:7px;transition:all .2s;text-align:left}
.u-char:hover{background:rgba(33,26,46,.7)}
.u-char.active{background:rgba(36,26,51,.8);border-color:var(--line-hi)}
.u-ava{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:16px;flex-shrink:0;border:1px solid}
.u-char b{font-size:13.5px;font-weight:500;color:var(--paper);display:block;letter-spacing:.05em}
.u-char span{font-family:var(--mono);font-size:9.5px;color:var(--faint);letter-spacing:.08em}
.u-char.lock{opacity:.42;cursor:default}
.u-tide{background:rgba(22,16,33,.7);border:1px solid var(--line);border-radius:7px;padding:11px 12px;margin-top:4px}
.u-tide .tt{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;letter-spacing:.1em;margin-bottom:7px}
.u-main{padding:17px 20px}
.u-hero{display:flex;gap:16px;margin-bottom:16px}
.u-portrait{width:92px;height:92px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:34px;flex-shrink:0;border:1.5px solid;position:relative;overflow:hidden}
.u-portrait::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 0%, rgba(255,255,255,.1), transparent 60%)}
.u-hinfo{flex:1;min-width:0}
.u-nrow{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.u-name{font-size:21px;font-weight:500;letter-spacing:.1em;color:#fff;margin:0}
.u-code{font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;padding:3px 9px;border-radius:3px;border:1px solid}
.u-role{font-size:12.5px;color:var(--faint);margin:5px 0 10px;letter-spacing:.05em}
.u-quote{font-size:12px;color:var(--paper-dim);font-style:italic;border-left:2px solid var(--line-hi);padding-left:10px;line-height:1.8}
.u-bars{display:flex;flex-direction:column;gap:11px;margin:4px 0 16px}
.u-blabel{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;letter-spacing:.16em;margin-bottom:5px;color:var(--paper-dim)}
.u-blabel b{font-weight:400;color:var(--paper)}
.u-track{height:8px;background:#1d1729;border-radius:4px;overflow:hidden;position:relative}
.u-fill{height:100%;border-radius:4px;transition:width 1.2s ease;position:relative}
.u-fill::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent 70%,rgba(255,255,255,.22));animation:barsheen 3.4s ease-in-out infinite}
@keyframes barsheen{0%,100%{opacity:.3}50%{opacity:1}}
.u-statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.u-stat{background:rgba(27,21,37,.7);border:1px solid var(--line);border-radius:6px;padding:9px 6px;text-align:center}
.u-stat span{font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);display:block;margin-bottom:4px}
.u-stat b{font-size:16px;font-weight:400;color:var(--paper)}
.u-abil{display:flex;gap:12px;align-items:flex-start;background:rgba(26,20,36,.7);border:1px solid var(--line);border-radius:7px;padding:11px 13px;margin-bottom:8px;transition:border-color .3s}

<noscript><div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-family:monospace;color:#b9aec9;text-align:center;padding:30px">这座小镇需要 JavaScript 才能被记得。<br>The town requires JavaScript to be remembered.</div></noscript>
<script>
/* ============================================================
   THE UNREMEMBERED — 引擎
   ============================================================ */
'use strict';
/* ---------- U · 工具 ---------- */
const U = {
  qs:(s,r)=> (r||document).querySelector(s),
  qa:(s,r)=> [...(r||document).querySelectorAll(s)],
  ce(tag, cls, html){ const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; },
  sleep:(ms)=> new Promise(r=>setTimeout(r,ms)),
  rnd:(a,b)=> a + Math.random()*(b-a),
  ri:(a,b)=> Math.floor(a+Math.random()*(b-a+1)),
  pick:(arr)=> arr[Math.floor(Math.random()*arr.length)],
  clamp:(v,a,b)=> Math.max(a,Math.min(b,v)),
  shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; },
  esc:(s)=> String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'),
};

/* ---------- 注册表 · 记忆 / 未寄出 / 暗裂 ---------- */
const MEMS = {
  m_bus:   {n:'看台上的第一条线',  d:'森娜最后坐过的位置。你的歌第一次叫醒了什么。', cost:'地图上「校园看台」的记忆线将熄灭', ch:1},
  m_stairs:{n:'帕里斯起草的第一段楼梯', d:'地板自己长出台阶的那个夜晚。他比你还惊讶。', cost:'档案里「共鸣」的那句话将被抹去', ch:1},
  m_fort:  {n:'毯子堡垒的暗号',    d:'你和森娜的三短一长。世界上只有你们俩知道。', cost:'某段对话里,最软的那个选项将不存在', ch:1},
  m_radio: {n:'车库收音机的下午',  d:'他修机器,你哼歌,雪花噪点慢慢变成了电台。', cost:'一个能修复清醒值的地方将失效', ch:2},
  m_atrium:{n:'中庭里的回声壳',    d:'你的摇篮曲第一次充满了三层楼。', cost:'地图上「灰谷商场」的记忆线将熄灭', ch:2},
  m_endscreen:{n:'朱尼珀的关播画面', d:'「直播结束了。谢谢你来过。」屏幕暗下去时,没有人鼓掌,但所有人都在。', cost:'在更深的地方,你将少一个可以确认的真实', ch:3},
};
const UNDS = {
  u_send:   {n:'未署名的草稿', icon:'●', d:'从看台缝隙里醒来的一句话。读不清,但很重。'},
  u_brother:{n:'治安官的第七年', icon:'❄', d:'七年积压的道歉,最早的一句只有称呼。'},
  u_confess:{n:'没说出口的喜欢', icon:'♡', d:'货架第三排,落了灰,还在保质期内。'},
  u_bye:    {n:'没有送出的再见', icon:'⌛', d:'写它的人后来假装那天没去车站。'},
  u_uup:    {n:'凌晨三点的「你还醒着吗」', icon:'☾', d:'后面还有半句,从来没人见过。'},
  u_mom:    {n:'给妈妈的草稿', icon:'✎', d:'你自己的。在「道歉」店里看见它时,你愣了很久。'},
};
const CRACKS = {
  ck_shell:    '中庭回声壳的接缝 —— 第二章,他说「我没事」的那一次',
  ck_bridge:   '信号桥的第三根弦 —— 第三章,你们赶时间的那一次',
  ck_safehouse:'被打了 C− 的安全屋 —— 第六章,他把分数咽下去的那一次',
};

/* ---------- SAVE · 伤痕系统(持久状态) ---------- */
const SAVE = {
  KEY:'unremembered.v2.save',
  S:null,
  fresh(){ return {
    v:2, reached:1, done:[],
    lucidity:84, stability:76,
    und:{}, mems:{}, cracks:[],
    hush:0, hushKnown:false,
    lullParis:null, sennaChoice:null, apology:null,
    motherWoken:null, woken:[], faceBurned:false,
    bricks:0, sendKept:null, juniper:false,
    ending:null, post:false, flags:{},
    set:{vol:.75, speed:1, fx:true},
  };},
  load(){ try{ const r=localStorage.getItem(this.KEY); this.S = r? Object.assign(this.fresh(), JSON.parse(r)) : this.fresh(); }catch(e){ this.S=this.fresh(); } return this.S; },
  save(){ try{ localStorage.setItem(this.KEY, JSON.stringify(this.S)); }catch(e){} },
  reset(){ this.S=this.fresh(); this.save(); },
  earn(id){ if(!this.S.mems[id]){ this.S.mems[id]=true; this.save(); FX.toast('✶ 记忆收下了 ——「'+MEMS[id].n+'」','amber'); } },
  burn(id){ this.S.mems[id]='burned'; this.save(); },
  alive(id){ return this.S.mems[id]===true; },
  addUnd(id, st){ if(!this.S.und[id]){ this.S.und[id]=st||'held'; this.save(); FX.toast(UNDS[id].icon+' 拾起未寄出 ——「'+UNDS[id].n+'」','teal'); } },
  deliver(id){ this.S.und[id]='delivered'; this.save(); },
  crack(id){ if(!this.S.cracks.includes(id)){ this.S.cracks.push(id); this.save(); } },
  luc(d){ this.S.lucidity=U.clamp(this.S.lucidity+d,0,100); E.meters(); this.save(); },
  sta(d){ this.S.stability=U.clamp(this.S.stability+d,0,100); E.meters(); this.save(); },
  hushUse(){ this.S.hush++; this.save(); applyHushTint(); },
};
let S = null;
function applyHushTint(){
  const n = SAVE.S? SAVE.S.hush : 0;
  const sat = Math.max(.45, 1 - n*.09);
  document.documentElement.classList.add('hushed');
  document.documentElement.style.filter = n>0? 'saturate('+sat.toFixed(2)+')' : '';
}

/* ---------- AU · 声音(全程序生成) ---------- */
const AU = (()=>{
  let C=null, out=null, mus=null, sfx=null, started=false;
  let droneNodes=[], humNodes=[], melodyStops=[];
  const F = {D3:146.83,F3:174.61,G3:196,A3:220,Bb3:233.08,C4:261.63,Cs4:277.18,D4:293.66,E4:329.63,F4:349.23,Fs4:369.99,G4:392,Gs4:415.3,A4:440,Bb4:466.16,C5:523.25,D5:587.33,E5:659.25,F5:698.46};
  function ensure(){
    if(started) return true;
    try{
      C = new (window.AudioContext||window.webkitAudioContext)();
      out = C.createGain(); out.gain.value = SAVE.S.set.vol; out.connect(C.destination);
      mus = C.createGain(); mus.gain.value=1; mus.connect(out);
      sfx = C.createGain(); sfx.gain.value=1; sfx.connect(out);
      started = true;
    }catch(e){ started=false; }
    return started;
  }
  function setVol(v){ if(out) out.gain.linearRampToValueAtTime(v, C.currentTime+.15); }
  function tone(freq, o){
    if(!started) return;
    o = o||{};
    const t0 = C.currentTime + (o.at||0);
    const osc = C.createOscillator(); osc.type = o.type||'sine';
    osc.frequency.value = freq;
    if(o.detune) osc.detune.value = o.detune;
    const g = C.createGain(); g.gain.value = 0;
    const A = o.attack!=null?o.attack:.04, D = o.dur!=null?o.dur:.5, R = o.release!=null?o.release:.25, G = o.gain!=null?o.gain:.12;
    g.gain.setValueAtTime(0,t0);
    g.gain.linearRampToValueAtTime(G, t0+A);
    g.gain.setValueAtTime(G, t0+A+D);
    g.gain.linearRampToValueAtTime(0, t0+A+D+R);
    let dest = o.bus==='mus'? mus : sfx;
    if(o.lpf){ const f=C.createBiquadFilter(); f.type='lowpass'; f.frequency.value=o.lpf; osc.connect(f); f.connect(g); }
    else osc.connect(g);
    g.connect(dest);
    osc.start(t0); osc.stop(t0+A+D+R+.05);
    if(o.bendTo){ osc.frequency.linearRampToValueAtTime(o.bendTo, t0+A+D); }
    if(o.wobble){ const l=C.createOscillator(), lg=C.createGain(); l.frequency.value=o.wobble; lg.gain.value=o.wobbleAmt||8; l.connect(lg); lg.connect(osc.detune); l.start(t0); l.stop(t0+A+D+R); }
    return osc;
  }
  function noiseBurst(o){
    if(!started) return;
    o=o||{};
    const t0=C.currentTime+(o.at||0), dur=o.dur||.3;
    const buf=C.createBuffer(1, C.sampleRate*dur, C.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src=C.createBufferSource(); src.buffer=buf;
    const f=C.createBiquadFilter(); f.type=o.type||'bandpass'; f.frequency.value=o.freq||1400; f.Q.value=o.q||.8;
    if(o.sweepTo) f.frequency.exponentialRampToValueAtTime(o.sweepTo, t0+dur);
    const g=C.createGain(); g.gain.setValueAtTime(o.gain!=null?o.gain:.18, t0);
    g.gain.exponentialRampToValueAtTime(.0001, t0+dur);
    src.connect(f); f.connect(g); g.connect(sfx);
    src.start(t0); src.stop(t0+dur);
  }
  /* —— 持续底噪(电台空气) —— */
  function airOn(level){
    if(!started) return;
    airOff();
    const buf=C.createBuffer(1, C.sampleRate*2, C.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src=C.createBufferSource(); src.buffer=buf; src.loop=true;
    const f=C.createBiquadFilter(); f.type='lowpass'; f.frequency.value=900;
    const g=C.createGain(); g.gain.value=0;
    g.gain.linearRampToValueAtTime(level||.012, C.currentTime+2);
    src.connect(f); f.connect(g); g.connect(mus);
    src.start();
    humNodes.push({src,g});
  }
  function airOff(){ humNodes.forEach(n=>{ try{ n.g.gain.linearRampToValueAtTime(0,C.currentTime+1); n.src.stop(C.currentTime+1.2);}catch(e){} }); humNodes=[]; }
  /* —— 氛围持续音 —— */
  function drone(mode){
    if(!started) return;
    stopDrone(1.6);
    if(mode==='none') return;
    const defs = {
      dusk:[ [F.D3,'sine',.05,0],[F.A3,'sine',.035,4],[F.D3*2.005,'triangle',.012,-6] ],
      veil:[ [F.D3,'sine',.04,0],[F.A3,'sine',.03,7],[F.E4,'sine',.02,-9],[F.Bb3,'triangle',.014,12] ],
      deep:[ [55,'sine',.055,0],[110*1.93,'sine',.014,5],[110*2.71,'sine',.01,-4] ],
      tense:[ [F.D3,'sawtooth',.018,0],[F.Bb3,'sine',.028,6],[F.E4,'sine',.016,-11] ],
    };
    const set = defs[mode]||defs.dusk;
    set.forEach((p,i)=>{
      const osc=C.createOscillator(); osc.type=p[1]; osc.frequency.value=p[0]; osc.detune.value=p[3];
      const g=C.createGain(); g.gain.value=0;
      g.gain.linearRampToValueAtTime(p[2], C.currentTime+3+i*.8);
      const lfo=C.createOscillator(); lfo.frequency.value=.05+i*.013;

/* ---------- FX · 界面效果 ---------- */
const FX = {
  _skip:false,
  async type(el, txt, mult){
    this._skip=false;
    const sp = (SAVE.S? SAVE.S.set.speed:1) * (mult||1);
    const base = 30/sp;
    el.innerHTML='';
    const frag = String(txt);
    let i=0, buf='';
    while(i<frag.length){
      if(this._skip){ el.innerHTML=frag; break; }
      const ch=frag[i];
      if(ch==='<'){ const j=frag.indexOf('>',i); buf+=frag.slice(i,j+1); i=j+1; el.innerHTML=buf; continue; }
      buf+=ch; el.innerHTML=buf; i++;
      let d=base;
      if('，、'.includes(ch)) d=base*5;
      else if('。！？…—'.includes(ch)) d=base*8;
      else if(ch==='\n') d=base*6;
      if(d>0) await U.sleep(d);
    }
    el.innerHTML=frag;
  },
  skip(){ this._skip=true; },
  toast(msg, cls, ms){
    const t=U.qs('#toast');
    t.className=cls||''; t.innerHTML=msg;
    requestAnimationFrame(()=>t.classList.add('show'));
    clearTimeout(this._tt);
    this._tt=setTimeout(()=>t.classList.remove('show'), ms||2600);
  },
  flash(op, dur){
    const f=U.qs('#flashfx');
    f.style.opacity=op!=null?op:.5;
    setTimeout(()=>f.style.opacity=0, dur||120);
  },
  glitch(el){ if(!SAVE.S.set.fx) return; el.classList.remove('glitch'); void el.offsetWidth; el.classList.add('glitch'); },
  shake(el){ const e=el||U.qs('#app'); e.classList.remove('shake'); void e.offsetWidth; e.classList.add('shake'); },
};

/* —— 确认框 —— */
function confirmBox(title, sub){
  return new Promise(res=>{
    const pm=U.ce('div','pausemenu fadein');
    pm.innerHTML='<div class="pm-t">'+U.esc(title)+'</div><div class="nar dim center" style="margin:-6px 0 14px">'+U.esc(sub||'')+'</div>';
    const yes=U.ce('button','btn','是 · 我确定');
    const no=U.ce('button','btn teal','不 · 再想想');
    pm.appendChild(yes); pm.appendChild(no);
    document.body.appendChild(pm);
    yes.onclick=()=>{ pm.remove(); res(true); };
    no.onclick=()=>{ pm.remove(); res(false); };
  });
}

        mctx.quadraticCurveTo((a[1]+b[1])/2*w+8,(a[2]+b[2])/2*h-8, b[1]*w,b[2]*h);

      });

  async hold(o){
    o=o||{};
    const wrap=U.ce('div','holdwrap fadeup');
    wrap.innerHTML='<div class="holdbtn'+(o.feel?' feel':'')+'" tabindex="0"><div class="hb-ring"></div><div class="hb-ico">'+(o.ico||'♪')+'</div><div class="hb-tx">'+(o.label||'按住 · 哼唱')+'</div></div>'+
      '<div class="hold-cap">'+(o.cap||'按住不放,直到线亮起来')+'</div>';
    this._beats.appendChild(wrap); this.scrollEnd();
    const btn=U.qs('.holdbtn',wrap), cap=U.qs('.hold-cap',wrap);
    const dur=o.dur||2600;
    let p=0, holding=false, raf=null, lastSing=0, done=false;
    return new Promise(res=>{
      const tick=(ts)=>{
        if(done) return;
        p += holding? (16.7/dur)*100 : -(16.7/(dur*.5))*100;
        p=U.clamp(p,0,100);
        btn.style.setProperty('--p',p);
        if(holding && AU.on && performance.now()-lastSing>620){ lastSing=performance.now(); if(o.sing!=='none') AU.lull(); }
        if(o.onP) o.onP(p, holding);
        if(p>=100){
          done=true; ATMOS.singing=false; btn.classList.remove('singing'); btn.classList.add('done');
          btn.style.setProperty('--p',100);
          cap.textContent=o.doneCap||'……线醒了。';
          AU.on&&AU.fx.chime();
          setTimeout(()=>res(true), 700);
          return;
        }
        raf=requestAnimationFrame(tick);
      };
      const down=(e)=>{ e.preventDefault(); holding=true; btn.classList.add('singing'); ATMOS.singing=true; if(!raf||p<=0) raf=requestAnimationFrame(tick); cancelAnimationFrame(raf); raf=requestAnimationFrame(tick); };
      const up=()=>{ holding=false; btn.classList.remove('singing'); ATMOS.singing=false; if(o.onRelease&&!done&&p>2) o.onRelease(p); };
      btn.addEventListener('pointerdown',down);
      window.addEventListener('pointerup',up);
      window.addEventListener('pointercancel',up);
    });
  },
  mini(html, cls){
    const el=U.ce('div','panel fadeup '+(cls||''), html||'');
    this._beats.appendChild(el); this.scrollEnd();
    return el;
  },
  async wait(ms){ await U.sleep(ms); },

  await N('灰谷镇现在记得每一个人。','center');
  await N('这意味着:灰谷镇现在<b>悲伤</b>得多了。葬礼补办了十一场,道歉电话打爆了两个基站,镇报头版连登一个月的「寻人启事(为道歉)」。镇子哭起来了——并且,肉眼可见地,<b>活</b>起来了。','',{amb:true});
  await N({back:'森娜回来了。自己想回来的那种回来。她在你家门廊放下行李箱,第一句话是:「先说好,我还是会需要消失几天的那种朋友。」你说:「成交。」',
           visit:'每个月第一个星期日,堡垒巷的雾里有一扇门。你带漫画,带新歌,从不带行李箱。上个月,是她先敲的三短一长。',
           letgo:'毕业册上,你在森娜该在的位置画了一扇门,门是虚掩的。审稿的韦老师看了很久,什么也没改。'}[S.sennaChoice||'letgo'],'lit');
  await N(S.apology==='held'? '帕里斯在灰谷镇买了人生第一张<b>不是折叠的</b>桌子。他和海勒每周通一次「电台会诊」,两代起草人,在修同一批旧裂缝。':'帕里斯留下来了。床底有一只他始终没拆的纸箱——也许明年。海勒说:不急。这一行,工期都很长。','lit');
  await N(S.hush===0? '你从头到尾,没有用过一次「噤」。世界保有它全部的颜色,和全部的疼。你全要了。':(S.hush<4?'你用过 '+S.hush+' 次「噤」。世界淡了一点点,你知道是哪几块。歌里那几个休止符,你唱得很诚实。':'你常常选择「噤」。世界很安静,很灰。但最后那首歌,你按住了,从头到尾。这,也算数。'),'lit');
  await N('莫依的电台,在那个周末更新了。没有变声器,没有匿名。标题只有一行:','dim');
  await N('<b>《给睡不着的镇子》——翻唱自薇丝珀(1987)。演唱:莫依。</b><br>第一条评论来自一个陌生号码:「主播,能不能点一首,明天的。」','lit');
  await runCredits();
}

  const sc=U.qs('#bscroll');
  const cr=U.ce('div','credits');

    '<div><div class="cr-k">A Weird-Fiction Mystery in Ten Chapters</div><div class="cr-v" style="font-size:26px;letter-spacing:.3em">未被记得者</div><div class="cr-k" style="margin-top:6px">THE UNREMEMBERED</div></div>'+
    '<div><div class="cr-k">原案 · 叙事设计文档</div><div class="cr-v">pariskang</div></div>'+
    '<div><div class="cr-k">为</div><div class="cr-v">灰谷镇全体未被记得者 而作</div></div>'+
    '<div><div class="cr-k">机制即隐喻</div><div class="cr-v" style="font-size:14px;color:var(--paper-dim)">清醒值 · 稳定值 · 共鸣 · 未寄出 · 燃忆 · 噤</div></div>'+
    '<div><div class="cr-k">以及谢谢</div><div class="cr-v">愿意按住 FEEL IT 的你</div></div>'+
    '<hr class="sep" style="width:40%">'+
    '<div style="height:26vh"></div>'+
    '<div class="lamp"></div>'+
    '<div class="cr-v" style="font-size:15px;letter-spacing:.2em">在很远的地方,<br>另一座小镇的路灯,嗡了一声。</div>'+
    '<div class="cr-k" style="margin-top:4vh">—— 完 ——</div>';
  U.qs('#beats').appendChild(cr);
  AU.drone('dusk');

  E.scrollEnd();
  await E.tap();
  const row=U.ce('div','choices');
  const b1=U.ce('button','btn','回到标题 · 镇子记得你了');
  b1.onclick=()=>go('title');
  row.appendChild(b1);
  U.qs('#beats').appendChild(row);
  E.scrollEnd();
}
ENGINE.epilogueSting = async function(){
  E.mount(10);
  document.body.classList.remove('veil','deep');
  ATMOS.setMode('deep');
  await SYS('FM 107.3 —— 信号很远。');
  await N('静电。然后,在噪点底下:一条没人走过的主街,一排刚刚开始发烫的钠灯。','dim');
  await N('一盏路灯,嗡了一声。像谁清了清嗓子。','veil');
  await N('(而你现在知道,该怎么找到他们了。)','center lit');

};
